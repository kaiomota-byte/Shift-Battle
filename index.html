<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shift Battle X</title>

    <style>

        body { margin: 0; padding: 0; background-color: #020205; overflow: hidden; font-family: Arial, sans-serif; cursor: default; }

        canvas { display: block; }

    </style>

</head>

<body>

    <script>

    (function() {

        const oldCanvas = document.querySelector('canvas');

        if (oldCanvas) oldCanvas.remove();



        const canvas = document.createElement('canvas');

        const ctx = canvas.getContext('2d');

        document.body.appendChild(canvas);



        const setupCanvas = () => {

            canvas.width = window.innerWidth;

            canvas.height = window.innerHeight;

        };

        window.addEventListener('resize', setupCanvas);

        setupCanvas();



        const BALL_RADIUS = 22;

        const GRAVITY = 0.10;      

        const FRICTION = 0.96;     

        const MOVE_SPEED = 0.4;    

        const ROTATION_SPEED = 0.10; 

        

        const CLASS_LIST = ['SWORD', 'WRENCH', 'BOMBERMAN', 'SHIELD', 'SNIPER', 'RAPIER', 'POISON'];

        const CLASS_COLORS = {

            'SWORD': { bg: '#0066ff', text: '#fff' },

            'WRENCH': { bg: '#ff8800', text: '#000' },

            'BOMBERMAN': { bg: '#660000', text: '#fff' },

            'SHIELD': { bg: '#7a9199', text: '#fff' },

            'SNIPER': { bg: '#ffcc00', text: '#000' },

            'RAPIER': { bg: '#ffffff', text: '#000' },

            'POISON': { bg: '#8800ff', text: '#fff' },

            'VOID': { bg: '#000000', text: '#a200ff', border: '#a200ff' },

            'TRAINING': { bg: '#1a1a1a', text: '#555', border: '#333' }

        };



        let gameState = 'MENU';

        let controlMode = 'MANUAL'; 

        let weaponBehavior = 'SPIN'; 

        let p1Index = 0, p2Index = 1;

        let bAzul, bVermelha;

        let entities = { bullets: [], pools: [], bombs: [], explosions: [], turrets: [] };

        const keys = {};



        canvas.addEventListener('mousedown', e => {

            if (gameState !== 'MENU') return;

            const rect = canvas.getBoundingClientRect();

            const mx = e.clientX - rect.left, my = e.clientY - rect.top;

            const checkSide = (startX, isP1) => {

                CLASS_LIST.forEach((_, i) => {

                    const bx = startX, by = 230 + i * 40, bw = 220, bh = 35;

                    if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {

                        if (isP1) p1Index = i; else p2Index = i;

                    }

                });

            };

            checkSide(canvas.width * 0.18, true);

            checkSide(canvas.width * 0.58, false);

        });



        window.addEventListener('keydown', e => {

            keys[e.code] = true;

            if (gameState === 'MENU') {

                if (e.key.toLowerCase() === 'w') p1Index = (p1Index - 1 + CLASS_LIST.length) % CLASS_LIST.length;

                if (e.key.toLowerCase() === 's') p1Index = (p1Index + 1) % CLASS_LIST.length;

                if (e.key === 'ArrowUp') p2Index = (p2Index - 1 + CLASS_LIST.length) % CLASS_LIST.length;

                if (e.key === 'ArrowDown') p2Index = (p2Index + 1) % CLASS_LIST.length;

                if (e.key === '1') p1Index = -1; if (e.key === '2') p1Index = -2; 

                if (e.key === '9') p2Index = -1; if (e.key === '0') p2Index = -2; 

                if (e.key.toLowerCase() === 'm') {

                    if (controlMode === 'BOT') controlMode = 'MANUAL';

                    else controlMode = (controlMode === 'MANUAL' ? 'AUTO' : 'MANUAL');

                }

                if (e.key.toLowerCase() === 'b') controlMode = (controlMode === 'BOT' ? 'MANUAL' : 'BOT');

                if (e.code === 'Space') startGame();

            }

            if (e.code === 'KeyG') weaponBehavior = (weaponBehavior === 'SPIN' ? 'DIRECTIONAL' : 'SPIN');

            if (e.code === 'Enter') resetToMenu();

            if (gameState === 'PLAYING') {

                if (e.code === 'ShiftLeft' && bAzul) bAzul.useUltimate();

                if (e.code === 'ShiftRight' && bVermelha && controlMode !== 'BOT') bVermelha.useUltimate();

            }

        });

        window.addEventListener('keyup', e => keys[e.code] = false);



        function startGame() {

            const arena = getArena();

            entities = { bullets: [], pools: [], bombs: [], explosions: [], turrets: [] };

            let t1 = p1Index === -1 ? 'VOID' : (p1Index === -2 ? 'TRAINING' : CLASS_LIST[p1Index]);

            let t2 = p2Index === -1 ? 'VOID' : (p2Index === -2 ? 'TRAINING' : CLASS_LIST[p2Index]);

            bAzul = new Ball(arena.x + 100, arena.y + arena.h/2, "#00f2ff", t1, true);

            bVermelha = new Ball(arena.x + arena.w - 100, arena.y + arena.h/2, "#ff0055", t2, false);

            if(controlMode === 'AUTO') { bAzul.vx = 5; bAzul.vy = 5; bVermelha.vx = -5; bVermelha.vy = -5; }

            gameState = 'PLAYING';

        }



        function resetToMenu() { gameState = 'MENU'; }

        function getArena() { return { x: canvas.width*0.15, y: canvas.height*0.2, w: canvas.width*0.7, h: canvas.height*0.65 }; }



        class Ball {

            constructor(x, y, color, type, isP1) {

                this.x = x; this.y = y; this.type = type; this.isP1 = isP1;

                this.color = (type === 'VOID') ? '#000000' : ((type === 'TRAINING') ? '#555' : color);

                this.maxHp = (type === 'VOID') ? 100 : (type === 'TRAINING' ? 999999 : 50);

                this.hp = this.maxHp;

                this.totalDamageTaken = 0;

                this.vx = 0; this.vy = 0;

                this.weaponAngle = 0;

                this.ultCharge = 0;

                this.lastAction = 0;

                this.isBesta = false;

            }

            takeDamage(dmg) { this.hp -= dmg; if(this.type === 'TRAINING') this.totalDamageTaken += dmg; }

            useUltimate() {

                if (this.ultCharge < 1 && this.type !== 'VOID' && this.type !== 'TRAINING') return;

                const enemy = (this === bAzul) ? bVermelha : bAzul;

                this.ultCharge = 0;

                if (this.type === 'SWORD') { this.isBesta = true; setTimeout(() => this.isBesta = false, 5000); }

                if (this.type === 'VOID') { enemy.takeDamage(15); enemy.x = canvas.width/2; this.ultCharge = 1; }

                if (this.type === 'TRAINING') { this.ultCharge = 1; this.totalDamageTaken = 0; this.hp = 999999; }

                if (this.type === 'BOMBERMAN') { for(let i=0; i<12; i++) entities.bombs.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, timer: 50, owner: this}); }

                if (this.type === 'WRENCH') { for(let i=0;i<6;i++){ let a=(Math.PI*2/6)*i; entities.turrets.push({x:enemy.x+Math.cos(a)*120, y:enemy.y+Math.sin(a)*120, angle:0, lastShot:0, owner:this, ammo:3, teleguied:true});}}

                if (this.type === 'SNIPER') { entities.bullets.push({x:this.x, y:this.y, vx:Math.cos(this.weaponAngle)*25, vy:Math.sin(this.weaponAngle)*25, owner:this, isSuper:true}); }

                if (this.type === 'RAPIER' || this.type === 'SHIELD' || this.type === 'POISON') {

                    let a = Math.atan2(enemy.y - this.y, enemy.x - this.x);

                    this.vx = Math.cos(a) * 20; this.vy = Math.sin(a) * 20;

                    if(this.type === 'POISON') this.poisonUlt = 120;

                }

            }

            update() {

                const arena = getArena();

                const enemy = (this === bAzul) ? bVermelha : bAzul;

                if (controlMode === 'MANUAL' || (controlMode === 'BOT' && this.isP1)) {

                    let dx = 0, dy = 0;

                    if (this.isP1) { if(keys['KeyW'])dy--; if(keys['KeyS'])dy++; if(keys['KeyA'])dx--; if(keys['KeyD'])dx++; }

                    else { if(keys['ArrowUp'])dy--; if(keys['ArrowDown'])dy++; if(keys['ArrowLeft'])dx--; if(keys['ArrowRight'])dx++; }

                    if (dx !== 0 || dy !== 0) {

                        let a = Math.atan2(dy, dx);

                        this.vx += Math.cos(a) * MOVE_SPEED; this.vy += Math.sin(a) * MOVE_SPEED;

                        if(weaponBehavior === 'DIRECTIONAL') this.weaponAngle = a;

                    }

                } else if (controlMode === 'BOT' && !this.isP1) {

                    let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);

                    let angleToPlayer = Math.atan2(enemy.y - this.y, enemy.x - this.x);

                    let targetDist = (this.type === 'SNIPER') ? 250 : 10;

                    if (dist > targetDist) { this.vx += Math.cos(angleToPlayer) * MOVE_SPEED; this.vy += Math.sin(angleToPlayer) * MOVE_SPEED; }

                    if (weaponBehavior === 'DIRECTIONAL') this.weaponAngle = angleToPlayer;

                    if (this.ultCharge >= 1) this.useUltimate();

                }

                if(weaponBehavior === 'SPIN') this.weaponAngle += ROTATION_SPEED;

                if(controlMode !== 'AUTO') { this.vy += GRAVITY; this.vx *= FRICTION; this.vy *= FRICTION; }

                this.x += this.vx; this.y += this.vy;

                if (this.x < arena.x + BALL_RADIUS) { this.x = arena.x + BALL_RADIUS; this.vx *= -1; }

                if (this.x > arena.x + arena.w - BALL_RADIUS) { this.x = arena.x + arena.w - BALL_RADIUS; this.vx *= -1; }

                if (this.y < arena.y + BALL_RADIUS) { this.y = arena.y + BALL_RADIUS; this.vy *= -1; }

                if (this.y > arena.y + arena.h - BALL_RADIUS) { this.y = arena.y + arena.h - BALL_RADIUS; this.vy *= -1; }

                

                if (this.type !== 'TRAINING') {

                    if (this.type === 'SNIPER' && Date.now() - this.lastAction > 1800) {

                        let a = Math.atan2(enemy.y-this.y, enemy.x-this.x);

                        entities.bullets.push({x:this.x, y:this.y, vx:Math.cos(a)*18, vy:Math.sin(a)*18, owner:this});

                        this.lastAction = Date.now();

                    }

                    if (this.type === 'BOMBERMAN' && Math.random() < 0.01) entities.bombs.push({x: this.x, y: this.y, timer: 75, owner: this});

                    if (this.type === 'POISON' && (this.poisonUlt > 0 || Math.random() < 0.15)) {

                        entities.pools.push({x: this.x, y: this.y, timer: 180, owner: this});

                        if(this.poisonUlt > 0) this.poisonUlt--;

                    }

                }

                this.ultCharge = Math.min(1, this.ultCharge + 0.002);

                let wLen = this.type === 'RAPIER' ? 55 : 45;

                let tx = this.x + Math.cos(this.weaponAngle) * wLen, ty = this.y + Math.sin(this.weaponAngle) * wLen;

                if (this.type !== 'TRAINING' && Math.hypot(tx - enemy.x, ty - enemy.y) < BALL_RADIUS + 12) {

                    let psh = this.type === 'SHIELD' ? 12 : 4, a = Math.atan2(enemy.y - this.y, enemy.x - this.x);

                    enemy.vx += Math.cos(a) * psh; enemy.vy += Math.sin(a) * psh;

                    if (Date.now() - this.lastAction > 500) {

                        // DANO DA CHAVE DE FENDA REDUZIDO PARA 3

                        enemy.takeDamage(this.type === 'SHIELD' ? 8 : (this.isBesta ? 15 : (this.type === 'WRENCH' ? 1 : 3)));

                        if(this.type === 'WRENCH') entities.turrets.push({x: tx, y: ty, angle: 0, lastShot: 0, owner: this, ammo: -1, teleguied: true});

                        this.lastAction = Date.now();

                    }

                }

            }

            draw() {

                if (this.type === 'VOID') {

                    ctx.save();

                    for(let i=0; i<3; i++) {

                        ctx.strokeStyle = i % 2 === 0 ? "#a200ff" : "#00f2ff";

                        ctx.lineWidth = 1;

                        let ox = (Math.random()-0.5)*10;

                        let oy = (Math.random()-0.5)*10;

                        ctx.beginPath();

                        ctx.arc(this.x + ox, this.y + oy, BALL_RADIUS + 2, 0, Math.PI*2);

                        ctx.stroke();

                    }

                    ctx.restore();

                }



                ctx.save(); 

                ctx.shadowBlur = (this.type === 'VOID') ? 20 : 15; 

                ctx.shadowColor = (this.type === 'VOID') ? "#a200ff" : this.color;

                

                ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI*2);

                ctx.fillStyle = this.color; ctx.fill();

                ctx.strokeStyle = (this.type === 'VOID') ? "#a200ff" : "#fff"; 

                ctx.lineWidth = this.isBesta ? 5 : 2; ctx.stroke();

                

                ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";

                

                if(this.type === 'TRAINING') {

                    ctx.fillText(`TOTAL: ${this.totalDamageTaken.toFixed(1)}`, this.x, this.y - 35);

                } else if(controlMode !== 'AUTO') {

                    ctx.fillText(Math.ceil(this.hp), this.x, this.y + 5);

                }

                

                ctx.translate(this.x, this.y); ctx.rotate(this.weaponAngle);

                ctx.shadowBlur = 20; ctx.shadowColor = (this.type === 'VOID') ? "#a200ff" : this.color; 

                ctx.lineWidth = 5; ctx.strokeStyle = (this.type === 'VOID') ? "#a200ff" : this.color;

                

                if(this.type === 'SWORD') { ctx.beginPath(); ctx.moveTo(BALL_RADIUS, 0); ctx.lineTo(BALL_RADIUS + 40, 0); ctx.stroke(); }

                else if(this.type === 'SHIELD') { ctx.beginPath(); ctx.arc(0, 0, BALL_RADIUS + 10, -1, 1); ctx.stroke(); }

                else if(this.type === 'RAPIER') { ctx.beginPath(); ctx.moveTo(BALL_RADIUS, 0); ctx.lineTo(BALL_RADIUS + 55, 0); ctx.stroke(); }

                else if(this.type === 'WRENCH') { ctx.strokeRect(BALL_RADIUS+20, -8, 10, 16); ctx.beginPath(); ctx.moveTo(BALL_RADIUS, 0); ctx.lineTo(BALL_RADIUS+20, 0); ctx.stroke(); }

                else if(this.type === 'VOID') { ctx.fillStyle = "#a200ff"; ctx.fillRect(BALL_RADIUS+20, -15, 20, 30); ctx.beginPath(); ctx.moveTo(BALL_RADIUS, 0); ctx.lineTo(BALL_RADIUS+20, 0); ctx.stroke(); }

                else if(this.type === 'SNIPER') ctx.strokeRect(BALL_RADIUS, -3, 40, 6);

                else if(this.type === 'BOMBERMAN') { ctx.beginPath(); ctx.arc(BALL_RADIUS + 15, 0, 10, 0, 7); ctx.stroke(); }

                else if(this.type === 'POISON') ctx.strokeRect(BALL_RADIUS + 10, -5, 15, 10);

                ctx.restore();

            }

        }



        function checkCollisions() {
