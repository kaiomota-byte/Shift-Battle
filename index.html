<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Battle X - Dynamic UI</title>
    <style>
        body { margin: 0; padding: 0; background-color: #020205; overflow: hidden; font-family: Arial, sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
    (function() {
        const oldCanvas = document.querySelector('canvas');
        if (oldCanvas) oldCanvas.remove();

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.body.appendChild(canvas);

        const setupCanvas = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', setupCanvas);
        setupCanvas();

        const BALL_RADIUS = 22;
        const GRAVITY = 0.12;      
        const FRICTION = 0.96;     
        const MOVE_SPEED = 0.45;    
        const ROTATION_SPEED = 0.12; 
        
        const CLASS_LIST = ['SWORD', 'WRENCH', 'BOMBERMAN', 'SHIELD', 'SNIPER', 'RAPIER', 'POISON'];
        const CLASS_COLORS = {
            'SWORD': { bg: '#0066ff', text: '#fff' },
            'WRENCH': { bg: '#ff8800', text: '#000' },
            'BOMBERMAN': { bg: '#660000', text: '#fff' },
            'SHIELD': { bg: '#7a9199', text: '#fff' },
            'SNIPER': { bg: '#ffcc00', text: '#000' },
            'RAPIER': { bg: '#ffffff', text: '#000' },
            'POISON': { bg: '#8800ff', text: '#fff' },
            'VOID': { bg: '#000000', text: '#a200ff', border: '#a200ff' }
        };

        let gameState = 'MENU';
        let controlMode = 'MANUAL'; 
        let weaponBehavior = 'SPIN'; 
        let p1Index = 0, p2Index = 1;
        let bAzul, bVermelha, bChefe;
        let entities = { bullets: [], pools: [], bombs: [], explosions: [], turrets: [] };
        const keys = {};

        const getArena = () => ({ x: canvas.width * 0.15, y: canvas.height * 0.2, w: canvas.width * 0.7, h: canvas.height * 0.65 });

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (gameState === 'MENU') {
                if (e.key.toLowerCase() === 'w') p1Index = (p1Index - 1 + CLASS_LIST.length) % CLASS_LIST.length;
                if (e.key.toLowerCase() === 's') p1Index = (p1Index + 1) % CLASS_LIST.length;
                if (e.key === 'ArrowUp') p2Index = (p2Index - 1 + CLASS_LIST.length) % CLASS_LIST.length;
                if (e.key === 'ArrowDown') p2Index = (p2Index + 1) % CLASS_LIST.length;
                if (e.key === '1') p1Index = -1; if (e.key === '9') p2Index = -1;
                if (e.key.toLowerCase() === 'm') controlMode = (controlMode === 'MANUAL' ? 'AUTO' : 'MANUAL');
                if (e.key.toLowerCase() === 'b') controlMode = 'BOT';
                if (e.code === 'Space') startGame('NORMAL');
            }
            if (e.code === 'KeyG') weaponBehavior = (weaponBehavior === 'SPIN' ? 'DIRECTIONAL' : 'SPIN');
            if (e.code === 'Enter') resetToMenu();
            if (gameState !== 'MENU') {
                if (e.code === 'ShiftLeft' && bAzul) bAzul.useUltimate();
                if (e.code === 'ShiftRight' && bVermelha) bVermelha.useUltimate();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        canvas.addEventListener('mousedown', e => {
            if (gameState !== 'MENU') return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            if (mx > canvas.width/2 - 100 && mx < canvas.width/2 + 100 && my > canvas.height * 0.82 && my < canvas.height * 0.82 + 50) {
                startGame('BOSS');
            }
        });

        function startGame(mode) {
            const arena = getArena();
            entities = { bullets: [], pools: [], bombs: [], explosions: [], turrets: [] };
            let t1 = p1Index === -1 ? 'VOID' : CLASS_LIST[p1Index];
            let t2 = p2Index === -1 ? 'VOID' : CLASS_LIST[p2Index];
            bAzul = new Ball(arena.x + 100, arena.y + arena.h/2, "#00f2ff", t1, true);
            bVermelha = new Ball(arena.x + arena.w - 100, arena.y + arena.h/2, "#ff0055", t2, false);
            if (mode === 'BOSS') { gameState = 'BOSS_BATTLE'; bChefe = new Boss(canvas.width/2, arena.y + arena.h/2); }
            else { 
                gameState = 'PLAYING'; bChefe = null; 
                if(controlMode === 'AUTO') { bAzul.vx = 7; bAzul.vy = 7; bVermelha.vx = -7; bVermelha.vy = -7; }
            }
        }

        function resetToMenu() { gameState = 'MENU'; }

        class Ball {
            constructor(x, y, color, type, isP1) {
                this.x = x; this.y = y; this.type = type; this.isP1 = isP1;
                this.color = (type === 'VOID') ? '#000000' : color;
                this.maxHp = (type === 'VOID') ? 120 : 60;
                this.hp = this.maxHp;
                this.vx = 0; this.vy = 0; this.weaponAngle = 0; this.ultCharge = 0; this.lastAction = 0;
            }
            takeDamage(dmg) { this.hp -= dmg; }
            useUltimate() {
                if (this.ultCharge < 1 && this.type !== 'VOID') return;
                const enemy = bChefe || (this.isP1 ? bVermelha : bAzul);
                this.ultCharge = 0;
                if (this.type === 'VOID') { enemy.takeDamage(20); this.ultCharge = 1; }
                if (this.type === 'SNIPER') entities.bullets.push({x:this.x, y:this.y, vx:Math.cos(this.weaponAngle)*25, vy:Math.sin(this.weaponAngle)*25, owner:this, isSuper:true});
                if (['RAPIER', 'SHIELD', 'POISON'].includes(this.type)) {
                    let a = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                    this.vx = Math.cos(a) * 22; this.vy = Math.sin(a) * 22;
                }
            }
            update() {
                const arena = getArena();
                const enemy = bChefe || (this.isP1 ? bVermelha : bAzul);
                let dx = 0, dy = 0;
                if (this.isP1) { if(keys['KeyW'])dy--; if(keys['KeyS'])dy++; if(keys['KeyA'])dx--; if(keys['KeyD'])dx++; }
                else if (gameState === 'BOSS_BATTLE' || controlMode === 'MANUAL') { if(keys['ArrowUp'])dy--; if(keys['ArrowDown'])dy++; if(keys['ArrowLeft'])dx--; if(keys['ArrowRight'])dx++; }
                if (!this.isP1 && controlMode === 'BOT' && gameState !== 'BOSS_BATTLE') {
                    let a = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                    this.vx += Math.cos(a) * MOVE_SPEED; this.vy += Math.sin(a) * MOVE_SPEED;
                    if (this.ultCharge >= 1) this.useUltimate();
                }
                if (dx !== 0 || dy !== 0) {
                    let a = Math.atan2(dy, dx); this.vx += Math.cos(a) * MOVE_SPEED; this.vy += Math.sin(a) * MOVE_SPEED;
                    if(weaponBehavior === 'DIRECTIONAL') this.weaponAngle = a;
                }
                if(weaponBehavior === 'SPIN') this.weaponAngle += ROTATION_SPEED;
                if(controlMode !== 'AUTO' || gameState === 'BOSS_BATTLE') { this.vy += GRAVITY; this.vx *= FRICTION; this.vy *= FRICTION; }
                this.x += this.vx; this.y += this.vy;
                if (this.x < arena.x + BALL_RADIUS) { this.x = arena.x + BALL_RADIUS; this.vx *= (controlMode==='AUTO'?-1:-0.6); }
                if (this.x > arena.x + arena.w - BALL_RADIUS) { this.x = arena.x + arena.w - BALL_RADIUS; this.vx *= (controlMode==='AUTO'?-1:-0.6); }
                if (this.y < arena.y + BALL_RADIUS) { this.y = arena.y + BALL_RADIUS; this.vy *= (controlMode==='AUTO'?-1:-0.6); }
                if (this.y > arena.y + arena.h - BALL_RADIUS) { this.y = arena.y + arena.h - BALL_RADIUS; this.vy *= (controlMode==='AUTO'?-1:-0.6); }
                
                this.ultCharge = Math.min(1, this.ultCharge + 0.003);
                let wLen = 45, tx = this.x + Math.cos(this.weaponAngle) * wLen, ty = this.y + Math.sin(this.weaponAngle) * wLen;
                if (Math.hypot(tx - enemy.x, ty - enemy.y) < (enemy.radius || BALL_RADIUS) + 10) {
                    enemy.takeDamage(0.3);
                    let a = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                    enemy.vx += Math.cos(a) * 1.5; enemy.vy += Math.sin(a) * 1.5;
                }
            }
            draw() {
                if (this.type === 'VOID') {
                    ctx.save(); ctx.strokeStyle = "#a200ff"; ctx.lineWidth = 2;
                    let s = 2 + Math.random()*5; ctx.strokeRect(this.x-BALL_RADIUS-s, this.y-BALL_RADIUS-s, (BALL_RADIUS+s)*2, (BALL_RADIUS+s)*2);
                    ctx.restore();
                }
                ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = (this.type==='VOID'?"#a200ff":this.color);
                ctx.beginPath(); ctx.arc(this.x, this.y, BALL_RADIUS, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.fill();
                ctx.strokeStyle = (this.type==='VOID'?"#a200ff":"#fff"); ctx.lineWidth = 2; ctx.stroke();
                
                // --- HP DENTRO DA BOLINHA (SÓ NO MANUAL/BOT) ---
                if(controlMode !== 'AUTO' || gameState === 'BOSS_BATTLE') {
                    ctx.fillStyle = "#fff"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
                    ctx.fillText(Math.ceil(this.hp), this.x, this.y + 5);
                }

                ctx.translate(this.x, this.y); ctx.rotate(this.weaponAngle);
                ctx.strokeStyle = (this.type==='VOID'?"#a200ff":this.color); ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(BALL_RADIUS, 0); ctx.lineTo(BALL_RADIUS+35, 0); ctx.stroke();
                ctx.restore();
            }
        }

        class Boss {
            constructor(x, y) { this.x = x; this.y = y; this.radius = 70; this.maxHp = 1500; this.hp = 1500; this.vx = 0; this.vy = 0; }
            takeDamage(dmg) { this.hp -= dmg; }
            update() {
                let target = (Math.random() < 0.5) ? bAzul : bVermelha;
                this.vx += (target.x - this.x) * 0.005; this.vy += (target.y - this.y) * 0.005;
                this.vx *= 0.98; this.vy *= 0.98; this.x += this.vx; this.y += this.vy;
                if (Math.random() < 0.03) {
                    let a = Math.atan2(target.y - this.y, target.x - this.x);
                    entities.bullets.push({x:this.x, y:this.y, vx:Math.cos(a)*10, vy:Math.sin(a)*10, owner:this});
                }
            }
            draw() {
                ctx.save(); ctx.shadowBlur = 30; ctx.shadowColor = "red";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = "#000"; ctx.fill(); ctx.strokeStyle = "red"; ctx.lineWidth = 4; ctx.stroke();
                ctx.restore();
            }
        }

        function checkCollisions() {
            const objs = bChefe ? [bAzul, bVermelha, bChefe] : [bAzul, bVermelha];
            for(let i=0; i<objs.length; i++) {
                for(let j=i+1; j<objs.length; j++) {
                    let dx = objs[j].x - objs[i].x, dy = objs[j].y - objs[i].y, d = Math.hypot(dx, dy);
                    let minD = (objs[i].radius || BALL_RADIUS) + (objs[j].radius || BALL_RADIUS);
                    if (d < minD) {
                        let a = Math.atan2(dy, dx), ov = minD - d;
                        objs[i].x -= Math.cos(a)*ov/2; objs[i].y -= Math.sin(a)*ov/2;
                        objs[j].x += Math.cos(a)*ov/2; objs[j].y += Math.sin(a)*ov/2;
                    }
                }
            }
        }

        function updateEntities() {
            entities.bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy; 
                ctx.fillStyle = b.owner instanceof Boss ? "red" : "white";
                ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill();
                [bAzul, bVermelha, bChefe].filter(p => p && p !== b.owner).forEach(p => {
                    if (Math.hypot(b.x-p.x, b.y-p.y) < (p.radius || BALL_RADIUS)) { p.takeDamage(5); entities.bullets.splice(i, 1); }
                });
            });
        }

        function drawUI() {
            const arena = getArena();
            if (bChefe) {
                ctx.fillStyle = "#200"; ctx.fillRect(arena.x, arena.y - 40, arena.w, 15);
                ctx.fillStyle = "red"; ctx.fillRect(arena.x, arena.y - 40, arena.w * (bChefe.hp/bChefe.maxHp), 15);
            }
            // --- BARRAS EXTERNAS: APENAS NO MODO AUTO ---
            if (controlMode === 'AUTO' && gameState !== 'BOSS_BATTLE') {
                // HP P1 (Esquerda)
                ctx.fillStyle = "#111"; ctx.fillRect(arena.x - 40, arena.y, 20, arena.h);
                ctx.fillStyle = "#00f2ff"; ctx.fillRect(arena.x - 40, arena.y + arena.h * (1 - bAzul.hp/bAzul.maxHp), 20, arena.h * (bAzul.hp/bAzul.maxHp));
                // HP P2 (Direita)
                ctx.fillStyle = "#111"; ctx.fillRect(arena.x + arena.w + 20, arena.y, 20, arena.h);
                ctx.fillStyle = "#ff0055"; ctx.fillRect(arena.x + arena.w + 20, arena.y + arena.h * (1 - bVermelha.hp/bVermelha.maxHp), 20, arena.h * (bVermelha.hp/bVermelha.maxHp));
            }
            // Ultimates sempre visíveis (barras finas)
            ctx.fillStyle = bAzul.ultCharge>=1?"#fff":"#333"; ctx.fillRect(arena.x - 55, arena.y + arena.h*(1-bAzul.ultCharge), 10, arena.h*bAzul.ultCharge);
            ctx.fillStyle = bVermelha.ultCharge>=1?"#fff":"#333"; ctx.fillRect(arena.x + arena.w + 45, arena.y + arena.h*(1-bVermelha.ultCharge), 10, arena.h*bVermelha.ultCharge);
        }

        function drawMenu() {
            ctx.fillStyle = "#020205"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.textAlign = "center"; ctx.fillStyle = "#00f2ff"; ctx.font = "bold 50px Arial";
            ctx.fillText("SHIFT BATTLE X", canvas.width/2, 100);
            ctx.font = "18px Arial"; ctx.fillStyle = "#666";
            ctx.fillText(`MODO: ${controlMode} [M/B] | ARMAS: ${weaponBehavior} [G] | ESPAÇO: JOGAR`, canvas.width/2, 140);
            ctx.fillStyle = "#111"; ctx.strokeStyle = "#a200ff"; ctx.strokeRect(canvas.width/2 - 100, canvas.height * 0.82, 200, 50);
            ctx.fillStyle = "#fff"; ctx.fillText("MODO CHEFÃO", canvas.width/2, canvas.height * 0.82 + 32);
            const drawSide = (x, current, title, col) => {
                ctx.fillStyle = col; ctx.font = "bold 22px Arial"; ctx.fillText(title, x + 110, 200);
                CLASS_LIST.forEach((name, i) => {
                    const isSel = (current === i); ctx.fillStyle = isSel ? col : "#111"; ctx.fillRect(x, 220 + i*40, 220, 35);
                    ctx.fillStyle = isSel ? "#000" : "#555"; ctx.fillText(name, x + 110, 243 + i*40);
                });
                if(current === -1) { ctx.fillStyle = "#a200ff"; ctx.fillRect(x, 500, 220, 35); ctx.fillStyle = "#fff"; ctx.fillText("VOID", x+110, 523); }
            };
            drawSide(canvas.width*0.18, p1Index, "P1 (WASD)", "#00f2ff");
            drawSide(canvas.width*0.58, p2Index, "P2 (SETAS)", "#ff0055");
        }

        function loop() {
            if (gameState === 'MENU') drawMenu();
            else {
                ctx.fillStyle = "#020205"; ctx.fillRect(0,0,canvas.width,canvas.height);
                const arena = getArena(); ctx.strokeStyle = "#151515"; ctx.strokeRect(arena.x, arena.y, arena.w, arena.h);
                checkCollisions(); updateEntities();
                bAzul.update(); bVermelha.update(); if(bChefe) bChefe.update();
                bAzul.draw(); bVermelha.draw(); if(bChefe) bChefe.draw();
                drawUI();
                if (bAzul.hp <= 0 || bVermelha.hp <= 0 || (bChefe && bChefe.hp <= 0)) resetToMenu();
            }
            requestAnimationFrame(loop);
        }
        loop();
    })();
    </script>
</body>
</html>
